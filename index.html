<!DOCTYPE html>  
<html>  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">  
<title>Watch Together</title>  
  
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>  
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>  
  
<style>  
*{box-sizing:border-box;margin:0;padding:0}  
html,body{height:100%}  

/* ========================= */
/* 🎨 THEMES (4 animated)    */
/* ========================= */
body{
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
min-height:100dvh;
overflow:hidden;
background:linear-gradient(-45deg,#1f1c2c,#928dab,#0f2027,#2c5364);
background-size:400% 400%;
animation:bg 12s ease infinite;

/* ✅ NEW: make background layers (shapes) render correctly */
position:relative;
isolation:isolate;
}

/* ========================= */
/* 🧩 TELEGRAM-LIKE PATTERN  */
/* ========================= */
body::before{
content:"";
position:fixed;
inset:-30%;
pointer-events:none;
z-index:0;
background-image:url("file_00000000b56c720a854ca8320ec902b3.png");
background-repeat:repeat;
background-size:220px 220px; /* کمی ریز ولی واضح */
opacity:.10;
mix-blend-mode:overlay;
filter:blur(.2px);
transform:translate3d(0,0,0);
animation:tgPattern 26s linear infinite;
}
@keyframes tgPattern{
0%{transform:translate3d(0,0,0) scale(1)}
50%{transform:translate3d(-140px,-90px,0) scale(1.02)}
100%{transform:translate3d(-280px,-180px,0) scale(1)}
}
body.dark::before{
opacity:.04;
mix-blend-mode:normal;
filter:blur(.3px) saturate(.8);
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Theme 1 (Default: Neon Night) */
body.theme1{
background:linear-gradient(-45deg,#1f1c2c,#928dab,#0f2027,#2c5364);
background-size:420% 420%;
animation:t1 12s ease infinite;
}
@keyframes t1{
0%{background-position:0% 40%}
50%{background-position:100% 60%}
100%{background-position:0% 40%}
}

/* Theme 2 (Aurora) */
body.theme2{
background:linear-gradient(-45deg,#061a2d,#00c9ff,#92fe9d,#6a11cb);
background-size:500% 500%;
animation:t2 14s ease infinite;
}
@keyframes t2{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Theme 3 (Cyber Sunset) */
body.theme3{
background:linear-gradient(-45deg,#12001b,#ff006e,#8338ec,#00f5d4);
background-size:480% 480%;
animation:t3 13s ease infinite;
}
@keyframes t3{
0%{background-position:10% 50%}
50%{background-position:90% 55%}
100%{background-position:10% 50%}
}

/* Theme 4 (Deep Ocean) */
body.theme4{
background:linear-gradient(-45deg,#000428,#004e92,#00c6ff,#0072ff);
background-size:520% 520%;
animation:t4 15s ease infinite;
}
@keyframes t4{
0%{background-position:0% 55%}
50%{background-position:100% 45%}
100%{background-position:0% 55%}
}

/* ✅ UPDATED: stronger telegram-like shapes for theme 2 & 3 (visible) */
body.theme2::after,
body.theme3::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
  radial-gradient(circle at 18% 28%, rgba(255,255,255,.10) 0%, transparent 42%),
  radial-gradient(circle at 82% 68%, rgba(255,255,255,.08) 0%, transparent 48%),
  radial-gradient(circle at 52% 52%, rgba(255,255,255,.07) 0%, transparent 62%),
  radial-gradient(circle at 30% 75%, rgba(255,255,255,.09) 0%, transparent 58%),
  radial-gradient(circle at 70% 22%, rgba(255,255,255,.06) 0%, transparent 55%),

  radial-gradient(circle, rgba(255,255,255,.08) 1px, transparent 1.2px);
background-size:
  auto, auto, auto, auto, auto,
  26px 26px;
opacity:.75;
mix-blend-mode:overlay;
filter: blur(.2px);
z-index:1;
animation:shapeMove 18s ease-in-out infinite;
}
@keyframes shapeMove{
0%{transform:translateY(0) translateX(0)}
50%{transform:translateY(-18px) translateX(10px)}
100%{transform:translateY(0) translateX(0)}
}

body.dark{background:#0b0b12}

.glass{  
background:rgba(255,255,255,.08);  
backdrop-filter:blur(12px);  
border:1px solid rgba(255,255,255,.1);  
border-radius:18px;  
}  
  
header{  
height:90px;  
flex-shrink:0;  
display:flex;  
justify-content:space-between;  
align-items:center;  
padding:0 16px;  
position:relative;  
}  

/* ✅ لوگوی بسیار بزرگ - وسط چین */
.logo-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  margin: 0 5px;
  position: relative;
}

.logo-wrapper img {
  height: 260px;  /* اندازه بسیار بزرگ */
  width: auto;
  max-height: 300px;
  filter: drop-shadow(0 0 50px rgba(255, 215, 0, 0.9)) drop-shadow(0 0 100px rgba(255, 215, 0, 0.5)) drop-shadow(0 0 150px rgba(255, 215, 0, 0.3));
  transition: filter 0.3s ease;
  display: block;
  image-rendering: auto;
  animation: logoGlow 3s ease-in-out infinite alternate;
  margin-top: 45px;  /* پایین‌تر آوردن لوگو */
}

@keyframes logoGlow {
  0% {
    filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.7)) drop-shadow(0 0 80px rgba(255, 215, 0, 0.4));
  }
  100% {
    filter: drop-shadow(0 0 70px rgba(255, 215, 0, 1)) drop-shadow(0 0 120px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 180px rgba(255, 215, 0, 0.3));
  }
}

/* در حالت موبایل لوگو بزرگ */
@media (max-width: 480px) {
  header {
    height: 75px;
  }
  .logo-wrapper img {
    height: 180px;
    max-height: 210px;
    margin-top: 35px;
  }
}

/* در حالت افقی */
@media (orientation: landscape) and (max-height: 600px) {
  header {
    height: 70px;
  }
  .logo-wrapper img {
    height: 140px;
    max-height: 160px;
    margin-top: 25px;
  }
}

/* ✅ قسمت تنظیمات و آنلاین - فاصله بسیار ریز از هدر */
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  position: relative;
  z-index: 5;
  margin-top: -2px;  /* فاصله بسیار ریز از هدر */
  margin-right: 5px;
}

/* برای موبایل */
@media (max-width: 480px) {
  .header-right {
    margin-top: -2px;
    margin-right: 3px;
  }
}

/* برای حالت افقی */
@media (orientation: landscape) and (max-height: 600px) {
  .header-right {
    margin-top: -2px;
    margin-right: 3px;
  }
}

.main{  
flex:1;  
display:flex;  
flex-direction:column;  
padding:8px;  
gap:8px;  
overflow:hidden;  
}

/* ✅ NEW: ensure content stays above shapes layer */
header, .main, #settings, #login, #welcomeOverlay{
position:relative;
z-index:2;
}

.video-container{  
flex:0 0 40%;  
padding:10px;  
display:flex;  
flex-direction:column;  
position:relative;  
overflow:hidden;  
}  

/* ✅ NEW: create a little space below video so the button is NOT on the video frame */
.video-container{padding:10px 10px 54px 10px;}

video{  
width:100%;  
flex:1;  
border-radius:12px;  
}  



/* ========================= */
/* 🎞️ VIDEO FRAME + NEON     */
/* ========================= */
video{
position:relative;
z-index:6;
background:#000;
border-radius:14px;
}

/* قاب ساده ولی شیک مثل قاب عکس */
.video-container::before{
content:"";
position:absolute;
inset:10px 10px 54px 10px; /* فقط محدوده ویدیو */
border-radius:16px;
border:2px solid rgba(255,255,255,.22);
box-shadow:
  inset 0 0 0 1px rgba(0,0,0,.25),
  0 12px 34px rgba(0,0,0,.35);
pointer-events:none;
z-index:5;
}

/* نور نئونی وقتی PLAY شد (مثل استریمرها) */
.video-container::after{
content:"";
position:absolute;
inset:6px 6px 50px 6px;
border-radius:18px;
background:conic-gradient(from 0deg,
  rgba(255,0,110,.60),
  rgba(131,56,236,.60),
  rgba(0,245,212,.60),
  rgba(0,136,255,.60),
  rgba(255,0,110,.60)
);
filter:blur(18px) hue-rotate(0deg);
opacity:0;
pointer-events:none;
z-index:4;
mix-blend-mode:screen;
transition:opacity .35s ease;
animation:neonSpin 5s linear infinite, neonHue 7s linear infinite;
}
.video-container.playing::after{opacity:.55;}
body.dark .video-container.playing::after{opacity:0;} /* دارک مود = خاموش شدن نور */

@keyframes neonSpin{to{transform:rotate(360deg)}}
@keyframes neonHue{to{filter:blur(18px) hue-rotate(360deg)}}

/* ✅ در حالت عمودی، پلیر بزرگ‌تر */
@media (orientation:portrait){
  .video-container{flex:0 0 52%;}
}

/********************/
/* 🎭 REAL CURTAIN  */
/********************/
#curtain{  
position:absolute;  
inset:10px;  
border-radius:12px;  
z-index:10;  
pointer-events:none;  
display:flex;  
overflow:hidden;  
}  

/* ✅ NEW: keep curtain only on video area (not the bottom button zone) */
#curtain{inset:10px 10px 54px 10px;}

#curtain .side{  
width:50%;  
height:100%;  
background:repeating-linear-gradient(90deg,#7a0000 0px,#b30000 20px,#7a0000 40px);  
box-shadow: inset 0 0 40px rgba(0,0,0,.6);  
transition:transform 1.6s cubic-bezier(.77,0,.18,1);  
}  
#curtain.open .left{transform:translateX(-105%)}  
#curtain.open .right{transform:translateX(105%)}  
#curtain.hide{display:none}  

/* 🥇 GOLD BAR */
#curtain::before{  
content:"";  
position:absolute;  
top:0; left:0;  
width:100%; height:14px;  
background:linear-gradient(90deg,#caa400,#ffd700,#fff3a0,#ffd700,#caa400);  
box-shadow:0 2px 8px rgba(255,215,0,.6), inset 0 -2px 4px rgba(0,0,0,.35);  
z-index:20;  
}  

/* 🎉 EMOJI OVERLAY ON VIDEO */
#videoEmoteLayer{
position:absolute;
inset:10px;
border-radius:12px;
pointer-events:none;
z-index:11;
overflow:hidden;
}

/* ✅ NEW: keep emote layer only on video area (not the bottom button zone) */
#videoEmoteLayer{inset:10px 10px 54px 10px;}

.fly-emo{
position:absolute;
font-size:34px;
filter: drop-shadow(0 6px 10px rgba(0,0,0,.45));
opacity:0;
animation:flyEmo 1.2s ease-out forwards;
}
@keyframes flyEmo{
0%{transform:translateX(-20px) translateY(0) scale(.9); opacity:0}
15%{opacity:1}
100%{transform:translateX(260px) translateY(-40px) scale(1.15); opacity:0}
}

/* 🟢 ONLINE DOT */
#onlineDot{
width:8px;
height:8px;
border-radius:50%;
background:#00ff66;
box-shadow:0 0 6px #00ff66;
animation:blinkOnline 1s infinite;
}
@keyframes blinkOnline{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

.chat-container{

/* ============================================================ */
/* 🎨 INPUT AREA - GOLDEN LUXURY DESIGN ✨                      */
/* ============================================================ */
.input-area {
  display: flex;
  gap: 10px;
  margin-top: 8px;
  flex-shrink: 0;
  align-items: center;
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(20px);
  padding: 6px 8px 6px 16px;
  border-radius: 50px;
  border: 2px solid transparent;
  background-image: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
    linear-gradient(135deg, #ffd700, #ffb800, #ffd700, #ffe066, #ffd700);
  background-origin: padding-box, border-box;
  background-clip: padding-box, border-box;
  box-shadow: 
    0 0 20px rgba(255, 215, 0, 0.15),
    inset 0 0 30px rgba(255, 215, 0, 0.05),
    0 8px 32px rgba(0, 0, 0, 0.4);
  transition: all 0.4s ease;
  animation: goldBorderPulse 3s ease-in-out infinite;
}

@keyframes goldBorderPulse {
  0%, 100% {
    box-shadow: 
      0 0 20px rgba(255, 215, 0, 0.15),
      inset 0 0 30px rgba(255, 215, 0, 0.05),
      0 8px 32px rgba(0, 0, 0, 0.4);
  }
  50% {
    box-shadow: 
      0 0 40px rgba(255, 215, 0, 0.3),
      inset 0 0 50px rgba(255, 215, 0, 0.08),
      0 8px 40px rgba(0, 0, 0, 0.5);
  }
}

.input-area:focus-within {
  box-shadow: 
    0 0 50px rgba(255, 215, 0, 0.35),
    inset 0 0 60px rgba(255, 215, 0, 0.1),
    0 8px 48px rgba(0, 0, 0, 0.5);
  transform: scale(1.01);
  border-color: transparent;
}

.input-area input {
  flex: 1;
  padding: 12px 16px;
  border-radius: 50px;
  border: none;
  font-size: 15px;
  background: transparent;
  color: #fff;
  outline: none;
  font-weight: 400;
  letter-spacing: 0.3px;
  transition: all 0.3s ease;
}

.input-area input::placeholder {
  color: rgba(255, 255, 255, 0.4);
  font-weight: 300;
  letter-spacing: 0.5px;
  transition: all 0.3s ease;
}

.input-area input:focus::placeholder {
  color: rgba(255, 215, 0, 0.3);
  transform: translateX(5px);
}

.input-area input:focus {
  color: #fff;
}

/* ✨ دکمه ارسال با عکس جدید - بسیار بزرگ */
.input-area button {
  padding: 0;
  border: none;
  border-radius: 50px;
  background: transparent;
  cursor: pointer;
  transition: all 0.3s ease;
  width: 70px;
  height: 70px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.input-area button img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  border-radius: 50px;
  transition: all 0.3s ease;
  filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.2));
  image-rendering: auto;
}

.input-area button:hover {
  transform: scale(1.08);
}

.input-area button:hover img {
  filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.5)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.2));
}

.input-area button:active {
  transform: scale(0.92);
}

/* حالت دارک مود برای اینپوت */
body.dark .input-area {
  background: rgba(0, 0, 0, 0.5);
  background-image: 
    linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
    linear-gradient(135deg, #ffd700, #ffb800, #ffd700, #ffe066, #ffd700);
}

body.dark .input-area input {
  color: #f0f0f0;
}

<script>
/* ===================== */  
/* ✅ VIDEO SYNC ADDED ✅ */  
/* ===================== */  
var vid=document.getElementById("video");  
var isSyncing=false;  
var lastSeekSend=0;


/* ✅ Neon glow toggle for video (adds/removes .playing on container) */
function __setVideoGlow(on){
  try{
    var vc=document.querySelector(".video-container");
    if(!vc) return;
    vc.classList.toggle("playing", !!on);
  }catch(e){}
}
  


/* keep glow in sync */
vid.addEventListener("play",()=>{__setVideoGlow(true);});
vid.addEventListener("pause",()=>{__setVideoGlow(false);});
vid.addEventListener("ended",()=>{__setVideoGlow(false);});

function pushState(state){  
  db.ref("video/state").set(state);  
}  

vid.addEventListener("play",()=>{  
  curtainOpenAndGo();  
  if(isSyncing)return;  
  pushState({action:"play",time:vid.currentTime,rate:vid.playbackRate,ts:Date.now()});  
});  

vid.addEventListener("pause",()=>{  
  curtainReset();  
  if(isSyncing)return;  
  pushState({action:"pause",time:vid.currentTime,rate:vid.playbackRate,ts:Date.now()});  
});  

vid.addEventListener("seeked",()=>{  
  curtainOpenAndGo();  
  if(isSyncing)return;  
  var now=Date.now();  
  if(now-lastSeekSend<250)return;  
  lastSeekSend=now;  
  pushState({action:"seek",time:vid.currentTime,rate:vid.playbackRate,ts:now});  
});  

vid.addEventListener("ratechange",()=>{  
  if(isSyncing)return;  
  pushState({action:"rate",time:vid.currentTime,rate:vid.playbackRate,ts:Date.now()});  
});  

db.ref("video/state").on("value",snap=>{  
  var s=snap.val();  
  if(!s)return;  
  isSyncing=true;  

  if(typeof s.rate==="number" && vid.playbackRate!==s.rate){  
    vid.playbackRate=s.rate;  
  }  

  if(typeof s.time==="number" && Math.abs(vid.currentTime-s.time)>0.6){  
    try{vid.currentTime=s.time;}catch(e){}  
  }  

  if(s.action==="seek"){ curtainOpenAndGo(); }  

  if(s.action==="play"){  
    var p=vid.play();  
    if(p && p.catch)p.catch(()=>{});  
  }  
  if(s.action==="pause"){ vid.pause(); }  

  setTimeout(()=>{isSyncing=false;},300);  
});  
/* ===== END SYNC ===== */  

/* 🟢 PROFESSIONAL ONLINE SYSTEM */
var connectedRef = db.ref(".info/connected");
connectedRef.on("value", function(snap) {
  if (snap.val() === true) {
    var con = db.ref("online/" + myId);
    con.set({user: username, ts: Date.now()});
    con.onDisconnect().remove();
  }
});
db.ref("online").on("value", snap => {
  var count = 0;
  snap.forEach(child => { if(child.val()) count++; });
  document.getElementById("online").innerText = "Online: " + count;
});

/*****************************/
/* ✅ REPLY PREVIEW SYSTEM ✅ */
/*****************************/
function setReply(text){  
  replyTo=text;  
  var box=document.getElementById("replyPreview");  
  var t=document.getElementById("replyPreviewText");  
  t.innerText=text;  
  box.style.display="block";  
  try{msg.focus();}catch(e){}  
}  
function cancelReply(){  
  replyTo=null;  
  var box=document.getElementById("replyPreview");  
  box.style.display="none";  
  document.getElementById("replyPreviewText").innerText="";  
}  

/****************************/
/* ✅ EDIT MESSAGE SYSTEM ✅ */
/****************************/
function setEdit(key,oldText){  
  editKey=key;  
  document.getElementById("editPreviewText").innerText=oldText;  
  document.getElementById("editPreview").style.display="block";  
  msg.value=oldText;  
  try{msg.focus();}catch(e){}  
  cancelReply();  
}  
function cancelEdit(){  
  editKey=null;  
  document.getElementById("editPreview").style.display="none";  
  document.getElementById("editPreviewText").innerText="";  
  msg.value="";  
}  

/*****************************/
/* ✅ TYPING INDICATOR ✅     */
/*****************************/
function setTyping(isTyping){  
  db.ref("typing/"+myId).set(isTyping?{user:username,typing:true,ts:Date.now()}:null);  
}  
db.ref("typing/"+myId).onDisconnect().remove();  

var typingTimer=null;  
msg.addEventListener("input",()=>{  
  setTyping(true);  
  if(typingTimer)clearTimeout(typingTimer);  
  typingTimer=setTimeout(()=>{setTyping(false);},900);  
});  
msg.addEventListener("blur",()=>{setTyping(false);});  

db.ref("typing").on("value",snap=>{  
  var names=[];  
  snap.forEach(c=>{  
    if(c.key!==myId && c.val() && c.val().typing){  
      names.push(c.val().user||"someone");  
    }  
  });  
  var box=document.getElementById("typingIndicator");  
  if(names.length){  
    box.style.display="block";  
    box.innerText=(names.length===1?names[0]:"چند نفر")+" در حال تایپ...";  
  }else{  
    box.style.display="none";  
    box.innerText="";  
  }  
});  

/*****************************/
/* ✅ CLOSE ANY OPEN PICKER ✅ */
/*****************************/
function closeAllPickers(){  
  document.querySelectorAll(".reaction-picker").forEach(p=>p.remove());  
}  
document.addEventListener("click",()=>{closeAllPickers();});  

/*****************************/
/* ✅ SEND (device removed)  */
/*****************************/
function send(){  
  if(!msg.value)return;  

  if(editKey){  
    db.ref("chat/"+editKey+"/text").set(msg.value);  
    db.ref("chat/"+editKey+"/edited").set(true);  
    msg.value="";  
    cancelEdit();  
    setTyping(false);  
    return;  
  }  

  db.ref("chat").push({  
    text:msg.value,  
    user:username,  
    time:Date.now(),  
    reply:replyTo,  
    seen:false,  
    edited:false,  
    reactions:{}  
  });  
  msg.value="";  
  cancelReply();  
  setTyping(false);  
}  

/********************************************/
/* ✅ DOUBLE TAP / DOUBLE CLICK TO REPLY ✅ */
/********************************************/
var lastTapTimeByKey={};  
function attachReplyHandlers(div,key,text){  
  div.addEventListener("dblclick",function(e){  
    e.stopPropagation();  
    setReply(text);  
  });  
  div.addEventListener("touchend",function(e){  
    var now=Date.now();  
    var last=lastTapTimeByKey[key]||0;  
    lastTapTimeByKey[key]=now;  
    if(now-last<320){  
      try{e.preventDefault();}catch(err){}  
      setReply(text);  
    }  
  },{passive:false});  
}  

/*****************************/
/* ✅ DELETE SINGLE MESSAGE ✅ */
/*****************************/
function deleteMessage(key){
  db.ref("chat/"+key).remove();
}

/*****************************/
/* ✅ CHAT RENDER            */
/*****************************/
db.ref("chat").on("child_added",snap=>{  
  var d=snap.val();  
  var key=snap.key;  

  if(d.user!==username){  
    db.ref("chat/"+key+"/seen").set(true);  
  }  

  var div=document.createElement("div");  
  div.className="message "+(d.user===username?"me":"other");  
  div.id="m_"+key;  

  if(d.reply){  
    var rep=document.createElement("div");  
    rep.className="reply-box";  
    rep.innerText=d.reply;  
    div.appendChild(rep);  
  }  

  var text=document.createElement("div");  
  text.innerText=d.text;  
  div.appendChild(text);  

  var meta=document.createElement("div");  
  meta.className="meta";  

  var reactBtn=document.createElement("span");  
  reactBtn.className="react-btn";  
  reactBtn.innerText="😊";  
  reactBtn.onclick=function(ev){  
    ev.stopPropagation();  
    closeAllPickers();  
    showReactions(key,div);  
  };  

  if(d.user===username){  
    var editBtn=document.createElement("span");  
    editBtn.className="edit-btn";  
    editBtn.innerText="✎";  
    editBtn.onclick=function(ev){  
      ev.stopPropagation();  
      closeAllPickers();  
      setEdit(key,d.text);  
    };  

    var delBtn=document.createElement("span");
    delBtn.className="del-btn";
    delBtn.innerText="🗑";
    delBtn.onclick=function(ev){
      ev.stopPropagation();
      if(confirm("پیام حذف بشه؟")){
        deleteMessage(key);
      }
    };
  }  

  meta.innerHTML=new Date(d.time).toLocaleTimeString().slice(0,5)  
  +(d.edited?" <span style='opacity:.75'>(edited)</span>":"")  
  +(d.user===username?" <span id='s"+key+"'>✔</span>":"");  

  if(d.user===username){  
    meta.appendChild(editBtn);  
    meta.appendChild(delBtn);
  }  
  meta.appendChild(reactBtn);  
  div.appendChild(meta);  

  var react=document.createElement("div");  
  react.className="reactions";  
  div.appendChild(react);  

  div.onclick=function(e){ e.stopPropagation(); };  
  attachReplyHandlers(div,key,d.text);  

  chat.appendChild(div);  
  chat.scrollTop=chat.scrollHeight;  

  if(d.user===username){  
    db.ref("chat/"+key+"/seen").on("value",s=>{  
      var el=document.getElementById("s"+key);
      if(el) el.innerText=s.val()?"✔✔":"✔";  
    });  
  }  
});  

db.ref("chat").on("child_removed",snap=>{
  var el=document.getElementById("m_"+snap.key);
  if(el) el.remove();
});

/*****************************/
/* ✅ REACTIONS PICKER       */
/*****************************/
function showReactions(key,div){  
  if(div.querySelector(".reaction-picker"))return;  
  var picker=document.createElement("div");  
  picker.className="reaction-picker";  

  var close=document.createElement("span");  
  close.className="picker-close";  
  close.innerText="✕";  
  close.onclick=function(ev){  
    ev.stopPropagation();  
    picker.remove();  
  };  
  picker.appendChild(close);  

  ["😍","😎","🤣","🩷","👌","😭","😡","🔥","😜"].forEach(e=>{  
    var span=document.createElement("span");  
    span.innerText=e;  
    span.onclick=function(ev){  
      ev.stopPropagation();  
      db.ref("chat/"+key+"/reactions/"+myId).set(e);  
      picker.remove();  
    };  
    picker.appendChild(span);  
  });  
  div.appendChild(picker);  
}  

db.ref("chat").on("child_changed",snap=>{  
  var d=snap.val();  
  var m=document.getElementById("m_"+snap.key);  
  if(m){  
    var mainText=m.querySelector("div:nth-child("+(d.reply?2:1)+")");  
    if(mainText) mainText.innerText=d.text;  

    var meta=m.querySelector(".meta");  
    if(meta){  
      var timeStr=new Date(d.time).toLocaleTimeString().slice(0,5);  
      var editedStr=d.edited?" <span style='opacity:.75'>(edited)</span>":"";  
      if(d.user===username){  
        meta.innerHTML=timeStr+editedStr+" <span id='s"+snap.key+"'>"+(d.seen?"✔✔":"✔")+"</span>";  

        var editBtn=document.createElement("span");  
        editBtn.className="edit-btn";  
        editBtn.innerText="✎";  
        editBtn.onclick=function(ev){  
          ev.stopPropagation();  
          closeAllPickers();  
          setEdit(snap.key,d.text);  
        };  

        var delBtn=document.createElement("span");
        delBtn.className="del-btn";
        delBtn.innerText="🗑";
        delBtn.onclick=function(ev){
          ev.stopPropagation();
          if(confirm("پیام حذف بشه؟")){
            deleteMessage(snap.key);
          }
        };

        meta.appendChild(editBtn);  
        meta.appendChild(delBtn);

        var reactBtn=document.createElement("span");  
        reactBtn.className="react-btn";  
        reactBtn.innerText="😊";  
        reactBtn.onclick=function(ev){  
          ev.stopPropagation();  
          closeAllPickers();  
          showReactions(snap.key,m);  
        };  
        meta.appendChild(reactBtn);  
      }else{  
        meta.innerHTML=timeStr+editedStr;  
        var reactBtn=document.createElement("span");  
        reactBtn.className="react-btn";  
        reactBtn.innerText="😊";  
        reactBtn.onclick=function(ev){  
          ev.stopPropagation();  
          closeAllPickers();  
          showReactions(snap.key,m);  
        };  
        meta.appendChild(reactBtn);  
      }  
    }  
  }  

  var react=document.querySelector("#m_"+snap.key+" .reactions");  
  if(react){  
    react.innerHTML="";  
    if(d.reactions){  
      Object.values(d.reactions).forEach(e=>{  
        react.innerHTML+=e+" ";  
      });  
    }  
  }  
});  

/*****************************/
/* ✅ CLEAR CHAT (SYNC) ✅    */
/*****************************/
function clearChat(){  
  db.ref("chat").remove();  
  chat.innerHTML="";  
  cancelReply();  
  cancelEdit();  
}  

</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const video = document.querySelector("video");
    const videoWrapper = document.querySelector(".video-wrapper");

    if (videoWrapper) {
        videoWrapper.style.minHeight = "88vh";
    }

    if (video) {
        video.addEventListener("play", () => {
            video.style.marginTop = "25px";
            video.style.transition = "all 0.4s ease";
        });

        video.addEventListener("pause", () => {
            video.style.marginTop = "0px";
        });
    }
});
</script>

<script>
/* ===== VIDEO SIZE CONTROL ===== */
var __sizeBtn = document.getElementById("videoSizeBtn");
var __sizePanel = document.getElementById("videoSizePanel");

function closeSizePanel(){
  if(__sizePanel) __sizePanel.style.display="none";
}

if(__sizeBtn){
__sizeBtn.addEventListener("click",function(e){
e.stopPropagation();
__sizePanel.style.display =
(__sizePanel.style.display==="none" || !__sizePanel.style.display)
? "block" : "none";
});
}

function setVideoSize(mode){
var v=document.getElementById("video");
if(!v)return;

if(mode==="contain"){
v.style.objectFit="contain";
}
else if(mode==="cover"){
v.style.objectFit="cover";
}
else if(mode==="100"){
v.style.objectFit="contain";
v.style.width="100%";
v.style.height="100%";
}
else if(mode==="stretch"){
v.style.objectFit="fill";
}

closeSizePanel();
}

document.addEventListener("click",function(){
closeSizePanel();
});
</script>
