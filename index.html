<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cinema Online</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body{
font-family:Arial;
color:white;
display:flex;
flex-direction:column;
min-height:100dvh;
overflow:hidden;
background:linear-gradient(-45deg,#1f1c2c,#928dab,#0f2027,#2c5364);
background-size:400% 400%;
animation:bg 12s ease infinite;
position:relative;
isolation:isolate;
}

body::before{
content:"";
position:fixed;
inset:-30%;
pointer-events:none;
z-index:0;
background-image:url("file_00000000b56c720a854ca8320ec902b3.png");
background-repeat:repeat;
background-size:220px 220px;
opacity:.10;
mix-blend-mode:overlay;
filter:blur(.2px);
transform:translate3d(0,0,0);
animation:tgPattern 26s linear infinite;
}
@keyframes tgPattern{
0%{transform:translate3d(0,0,0) scale(1)}
50%{transform:translate3d(-140px,-90px,0) scale(1.02)}
100%{transform:translate3d(-280px,-180px,0) scale(1)}
}
body.dark::before{
opacity:.04;
mix-blend-mode:normal;
filter:blur(.3px) saturate(.8);
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

body.theme1{
background:linear-gradient(-45deg,#1f1c2c,#928dab,#0f2027,#2c5364);
background-size:420% 420%;
animation:t1 12s ease infinite;
}
@keyframes t1{
0%{background-position:0% 40%}
50%{background-position:100% 60%}
100%{background-position:0% 40%}
}

body.theme2{
background:linear-gradient(-45deg,#061a2d,#00c9ff,#92fe9d,#6a11cb);
background-size:500% 500%;
animation:t2 14s ease infinite;
}
@keyframes t2{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

body.theme3{
background:linear-gradient(-45deg,#12001b,#ff006e,#8338ec,#00f5d4);
background-size:480% 480%;
animation:t3 13s ease infinite;
}
@keyframes t3{
0%{background-position:10% 50%}
50%{background-position:90% 55%}
100%{background-position:10% 50%}
}

body.theme4{
background:linear-gradient(-45deg,#000428,#004e92,#00c6ff,#0072ff);
background-size:520% 520%;
animation:t4 15s ease infinite;
}
@keyframes t4{
0%{background-position:0% 55%}
50%{background-position:100% 45%}
100%{background-position:0% 55%}
}

body.theme2::after,
body.theme3::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
  radial-gradient(circle at 18% 28%, rgba(255,255,255,.10) 0%, transparent 42%),
  radial-gradient(circle at 82% 68%, rgba(255,255,255,.08) 0%, transparent 48%),
  radial-gradient(circle at 52% 52%, rgba(255,255,255,.07) 0%, transparent 62%),
  radial-gradient(circle at 30% 75%, rgba(255,255,255,.09) 0%, transparent 58%),
  radial-gradient(circle at 70% 22%, rgba(255,255,255,.06) 0%, transparent 55%),
  radial-gradient(circle, rgba(255,255,255,.08) 1px, transparent 1.2px);
background-size: auto, auto, auto, auto, auto, 26px 26px;
opacity:.75;
mix-blend-mode:overlay;
filter: blur(.2px);
z-index:1;
animation:shapeMove 18s ease-in-out infinite;
}
@keyframes shapeMove{
0%{transform:translateY(0) translateX(0)}
50%{transform:translateY(-18px) translateX(10px)}
100%{transform:translateY(0) translateX(0)}
}

body.dark{background:#0b0b12}

.glass{  
background:rgba(255,255,255,.08);  
backdrop-filter:blur(12px);  
border:1px solid rgba(255,255,255,.1);  
border-radius:18px;  
}  

/* ===== HEADER با لوگوی بزرگ وسط و دکمه تنظیمات ===== */
header{  
height:100px;  
flex-shrink:0;  
display:flex;  
justify-content:space-between;  
align-items:center;  
padding:0 16px;  
position:relative;  
}  

.logo-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 1;
  margin: 0 5px;
  position: relative;
}

.logo-wrapper img {
  height: 350px;
  width: auto;
  max-height: 380px;
  filter: drop-shadow(0 0 60px rgba(255, 215, 0, 0.9)) drop-shadow(0 0 120px rgba(255, 215, 0, 0.5)) drop-shadow(0 0 180px rgba(255, 215, 0, 0.3));
  transition: filter 0.3s ease;
  display: block;
  image-rendering: auto;
  animation: logoGlow 3s ease-in-out infinite alternate;
  margin-top: 20px;
}

@keyframes logoGlow {
  0% { filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.7)) drop-shadow(0 0 80px rgba(255, 215, 0, 0.4)); }
  100% { filter: drop-shadow(0 0 80px rgba(255, 215, 0, 1)) drop-shadow(0 0 140px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 200px rgba(255, 215, 0, 0.3)); }
}

@media (max-width: 480px) {
  header { height: 80px; }
  .logo-wrapper img { height: 220px; max-height: 250px; margin-top: 15px; }
}
@media (orientation: landscape) and (max-height: 600px) {
  header { height: 70px; }
  .logo-wrapper img { height: 160px; max-height: 180px; margin-top: 10px; }
}

/* ===== دکمه تنظیمات در هدر ===== */
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  position: relative;
  z-index: 5;
  margin-right: 5px;
}

.header-right button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  padding: 6px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s ease;
}

.header-right button:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.05);
}

.main{  
flex:1;  
display:flex;  
flex-direction:column;  
padding:8px;  
gap:8px;  
overflow:hidden;  
}

header, .main, #settings, #login, #welcomeOverlay{
position:relative;
z-index:2;
}

.video-container{  
flex:0 0 40%;  
padding:10px;  
display:flex;  
flex-direction:column;  
position:relative;  
overflow:hidden;  
}  

.video-container{padding:10px 10px 54px 10px;}

video{  
width:100%;  
flex:1;  
border-radius:12px;  
}  

video{
position:relative;
z-index:6;
background:#000;
border-radius:14px;
}

.video-container::before{
content:"";
position:absolute;
inset:10px 10px 54px 10px;
border-radius:16px;
border:2px solid rgba(255,255,255,.22);
box-shadow: inset 0 0 0 1px rgba(0,0,0,.25), 0 12px 34px rgba(0,0,0,.35);
pointer-events:none;
z-index:5;
}

.video-container::after{
content:"";
position:absolute;
inset:6px 6px 50px 6px;
border-radius:18px;
background:conic-gradient(from 0deg, rgba(255,0,110,.60), rgba(131,56,236,.60), rgba(0,245,212,.60), rgba(0,136,255,.60), rgba(255,0,110,.60));
filter:blur(18px) hue-rotate(0deg);
opacity:0;
pointer-events:none;
z-index:4;
mix-blend-mode:screen;
transition:opacity .35s ease;
animation:neonSpin 5s linear infinite, neonHue 7s linear infinite;
}
.video-container.playing::after{opacity:.55;}
body.dark .video-container.playing::after{opacity:0;}
@keyframes neonSpin{to{transform:rotate(360deg)}}
@keyframes neonHue{to{filter:blur(18px) hue-rotate(360deg)}}

@media (orientation:portrait){ .video-container{flex:0 0 52%;} }

#curtain{  
position:absolute;  
inset:10px;  
border-radius:12px;  
z-index:10;  
pointer-events:none;  
display:flex;  
overflow:hidden;  
}  
#curtain{inset:10px 10px 54px 10px;}
#curtain .side{  
width:50%;  
height:100%;  
background:repeating-linear-gradient(90deg,#7a0000 0px,#b30000 20px,#7a0000 40px);  
box-shadow: inset 0 0 40px rgba(0,0,0,.6);  
transition:transform 1.6s cubic-bezier(.77,0,.18,1);  
}  
#curtain.open .left{transform:translateX(-105%)}  
#curtain.open .right{transform:translateX(105%)}  
#curtain.hide{display:none}  
#curtain::before{  
content:"";  
position:absolute;  
top:0; left:0;  
width:100%; height:14px;  
background:linear-gradient(90deg,#caa400,#ffd700,#fff3a0,#ffd700,#caa400);  
box-shadow:0 2px 8px rgba(255,215,0,.6), inset 0 -2px 4px rgba(0,0,0,.35);  
z-index:20;  
}  

#videoEmoteLayer{
position:absolute;
inset:10px;
border-radius:12px;
pointer-events:none;
z-index:11;
overflow:hidden;
}
#videoEmoteLayer{inset:10px 10px 54px 10px;}
.fly-emo{
position:absolute;
font-size:34px;
filter: drop-shadow(0 6px 10px rgba(0,0,0,.45));
opacity:0;
animation:flyEmo 1.2s ease-out forwards;
}
@keyframes flyEmo{
0%{transform:translateX(-20px) translateY(0) scale(.9); opacity:0}
15%{opacity:1}
100%{transform:translateX(260px) translateY(-40px) scale(1.15); opacity:0}
}

#onlineDot{
width:8px;
height:8px;
border-radius:50%;
background:#00ff66;
box-shadow:0 0 6px #00ff66;
animation:blinkOnline 1s infinite;
}
@keyframes blinkOnline{
0%{opacity:1}
50%{opacity:.3}
100%{opacity:1}
}

.chat-container{  
flex:1;  
padding:10px;  
display:flex;  
flex-direction:column;  
min-height:0;  
position:relative;
}  

/* ✅ هدر چت با اسم کاربران آنلاین (بدون دکمه پینگ) */
.chat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 8px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(8px);
  border-radius: 12px 12px 0 0;
  flex-shrink: 0;
  min-height: 28px;
  margin-bottom: 4px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.online-users {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 11px;
  align-items: center;
  width: 100%;
}

.online-user {
  display: flex;
  align-items: center;
  gap: 4px;
  opacity: 0.85;
}

.online-user .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #00ff66;
  display: inline-block;
  animation: blinkOnline 1.5s infinite;

.online-user .ping-badge {

  border-radius: 8px;

.ping-good { color: #00ff88; }
.ping-medium { color: #ff8c00; }
.ping-bad { color: #ff2222; }
.ping-offline { color: #ff4444; }

.chat-box{  
flex:1;  
overflow-y:auto;  
display:flex;  
flex-direction:column;  
gap:4px;  
padding:4px 0;
}  

.message{  
padding:5px 8px;  
border-radius:12px;  
max-width:70%;  
font-size:13px;  
display:flex;  
flex-direction:column;  
gap:2px;  
position:relative;  
}  
.me{align-self:flex-end;background:#0088ff;border-bottom-right-radius:3px}  
.other{align-self:flex-start;background:#2a2a32;border-bottom-left-radius:3px}  

.meta{  
font-size:9px;  
opacity:.6;  
display:flex;  
justify-content:flex-end;  
gap:3px;  
align-items:center;  
flex-wrap:wrap;  
}  

.msg-username {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255, 215, 0, 0.9);
  margin-bottom: 1px;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
}
.other .msg-username {

}

.reply-box{  
font-size:10px;  
opacity:.7;  
border-left:2px solid #fff;  
padding-left:4px;  
margin-bottom:2px;  
}  

.reactions{  
display:flex;  
gap:3px;  
font-size:12px;  
margin-top:2px;  
}  

.reaction-picker{  
position:absolute;  
bottom:100%;  
background:#1c1c22;  
padding:4px;  
border-radius:8px;  
display:flex;  
gap:4px;  
font-size:16px;  
align-items:center;  
}  

.react-btn{  
font-size:10px;  
opacity:.9;  
padding:1px 4px;  
border-radius:6px;  
border:1px solid rgba(255,255,255,.25);

.react-btn:active{transform:scale(.96)}  

.edit-btn{

cursor:pointer;

.del-btn{
font-size:10px;

.picker-close{

#typingIndicator{

margin-bottom:2px;

#replyPreview{

#replyPreview .rp-top{

#replyPreview .rp-text{

white-space:nowrap;

#cancelReply{

padding:1px 6px;

border:1px solid rgba(255,255,255,.25);

#editPreview{  
display:none;  
flex-shrink:0;  
margin-top:4px;

border-radius:12px;  
border-left:3px solid #ffd400;

#editPreview .ep-top{

justify-content:space-between;  
align-items:center;  
gap:8px;  
margin-bottom:2px;

opacity:.9;

font-size:11px;  
opacity:.9;  
white-space:nowrap;  
overflow:hidden;  
text-overflow:ellipsis;  
}  
#cancelEdit{  
font-size:11px;  
padding:1px 6px;  
border-radius:8px;  
border:1px solid rgba(255,255,255,.25);  
background:rgba(255,255,255,.08);  
color:white;

.input-area {
  display: flex;
  gap: 6px;
  margin-top: 4px;
  flex-shrink: 0;
  align-items: center;
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(20px);
  padding: 3px 5px 3px 12px;
  border-radius: 50px;
  border: 2px solid transparent;
  background-image: 
    linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
    linear-gradient(135deg, #ffd700, #ffb800, #ffd700, #ffe066, #ffd700);
  background-origin: padding-box, border-box;
  background-clip: padding-box, border-box;
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.12), inset 0 0 20px rgba(255, 215, 0, 0.04), 0 4px 20px rgba(0, 0, 0, 0.3);
  transition: all 0.4s ease;
  animation: goldBorderPulse 3s ease-in-out infinite;
  min-height: 38px;
}

@keyframes goldBorderPulse {
  0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.12), inset 0 0 20px rgba(255, 215, 0, 0.04), 0 4px 20px rgba(0, 0, 0, 0.3); }
  50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.25), inset 0 0 35px rgba(255, 215, 0, 0.06), 0 4px 25px rgba(0, 0, 0, 0.4); }
}

.input-area:focus-within {
  box-shadow: 0 0 40px rgba(255, 215, 0, 0.3), inset 0 0 40px rgba(255, 215, 0, 0.08), 0 4px 30px rgba(0, 0, 0, 0.4);
  transform: scale(1.01);
  border-color: transparent;
}

.input-area input {
  flex: 1;
  padding: 4px 10px;
  border-radius: 50px;
  border: none;
  font-size: 13px;
  background: transparent;
  color: #fff;
  outline: none;
  font-weight: 400;
  letter-spacing: 0.2px;
  transition: all 0.3s ease;
  height: 28px;
}

.input-area input::placeholder {
  color: rgba(255, 255, 255, 0.35);
  font-weight: 300;
  letter-spacing: 0.3px;
  transition: all 0.3s ease;
}
.input-area input:focus::placeholder {
  color: rgba(255, 215, 0, 0.25);
  transform: translateX(4px);
}
.input-area input:focus { color: #fff; }

.input-area button {
  padding: 0;
  border: none;
  border-radius: 50px;
  background: transparent;
  cursor: pointer;
  transition: all 0.3s ease;
  width: 48px;
  height: 48px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  margin: -5px 0;
}

.input-area button img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  border-radius: 50px;
  transition: all 0.3s ease;
  filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.15));
  image-rendering: auto;
}

.input-area button:hover { transform: scale(1.08); }
.input-area button:hover img { filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.5)) drop-shadow(0 0 50px rgba(255, 215, 0, 0.2)); }
.input-area button:active { transform: scale(0.92); }

body.dark .input-area {
  background: rgba(0, 0, 0, 0.5);
  background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), linear-gradient(135deg, #ffd700, #ffb800, #ffd700, #ffe066, #ffd700);
}
body.dark .input-area input { color: #f0f0f0; }

#settings{  
position:fixed;  
right:-300px;  
top:0;  
width:280px;  
height:100%;  
padding:20px;  
transition:.3s;  
z-index:100;  
overflow-y:auto;  
-webkit-overflow-scrolling:touch;  
background:rgba(0,0,0,0.85);
backdrop-filter:blur(25px);
border-left:1px solid rgba(255,215,0,0.15);
}  
#settings.open{right:0}  

#settings button {
  width: 100%;
  margin-bottom: 12px;
  padding: 14px 18px;
  border: none;
  border-radius: 14px;
  color: #fff;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
  letter-spacing: 0.5px;
  background: linear-gradient(135deg, #8B0000, #CC0000, #8B0000);
  background-size: 200% 200%;
  box-shadow: 0 4px 20px rgba(200, 0, 0, 0.3), inset 0 1px 0 rgba(255,215,0,0.2);
  position: relative;
  overflow: hidden;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  animation: btnShine 4s ease-in-out infinite;
}

@keyframes btnShine {
  0% { background-position: 0% 50%; box-shadow: 0 4px 20px rgba(200, 0, 0, 0.3), inset 0 1px 0 rgba(255,215,0,0.2); }
  50% { background-position: 100% 50%; box-shadow: 0 4px 30px rgba(255, 215, 0, 0.3), 0 4px 20px rgba(200, 0, 0, 0.3), inset 0 1px 0 rgba(255,215,0,0.3); }
  100% { background-position: 0% 50%; box-shadow: 0 4px 20px rgba(200, 0, 0, 0.3), inset 0 1px 0 rgba(255,215,0,0.2); }
}

#settings button::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 20%;
  width: 60%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ffd700, #ffb800, #ffd700, transparent);
  border-radius: 2px;
  opacity: 0.6;
  transition: all 0.3s ease;
}

#settings button:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 8px 35px rgba(255, 215, 0, 0.3), 0 4px 25px rgba(200, 0, 0, 0.4);
}

#settings button:hover::after {
  opacity: 1;
  width: 80%;
  left: 10%;
}

#settings button:active {
  transform: scale(0.97);
  box-shadow: 0 2px 10px rgba(200, 0, 0, 0.3);
}

#settings button:last-child {

// محاسبه پینگ واقعی
function measurePing(){
  return new Promise((resolve) => {
    const start = performance.now();
    fetch('https://www.google.com/favicon.ico', { 
      mode: 'no-cors',
      cache: 'no-store'
    })
    .then(() => {
      const ping = Math.round(performance.now() - start);
      resolve(ping);
    })
    .catch(() => {
      resolve(null);
    });
  });
}

// به‌روزرسانی پینگ کاربران
async function updateUserPings(){
  const users = document.querySelectorAll('.online-user');
  for(const el of users){
    const userId = el.dataset.userId;
    if(userId && userId !== myId){
      const ping = await measurePing();
      const badge = el.querySelector('.ping-badge');
      if(badge){
        if(ping !== null){
          badge.textContent = ping + 'ms';
          badge.className = 'ping-badge';
          if(ping < 300) badge.classList.add('ping-good');
          else if(ping < 600) badge.classList.add('ping-medium');
          else badge.classList.add('ping-bad');
        } else {
          badge.textContent = '⛔';
          badge.className = 'ping-badge ping-offline';
        }
      }
    }
  }
}

async function updateMyPing(){

  const myEl = document.querySelector('.online-user[data-user-id="' + myId + '"] .ping-badge');

      else myEl.classList.add('ping-bad');
    } else {
      myEl.textContent = '⛔';
      myEl.className = 'ping-badge ping-offline';
    }
  }
}

<script>

var vid=document.getElementById("video");  
var isSyncing=false;  
var lastSeekSend=0;

function __setVideoGlow(on){
  try{
    var vc=document.querySelector(".video-container");
    if(!vc) return;
    vc.classList.toggle("playing", !!on);
  }catch(e){}
}

vid.addEventListener("play",()=>{__setVideoGlow(true);});
vid.addEventListener("pause",()=>{__setVideoGlow(false);});
vid.addEventListener("ended",()=>{__setVideoGlow(false);});

function pushState(state){  
  db.ref("video/state").set(state);  
}  

vid.addEventListener("play",()=>{  
  curtainOpenAndGo();  
  if(isSyncing)return;  
  pushState({action:"play",time:vid.currentTime,rate:vid.playbackRate,ts:Date.now()});  
});  

vid.addEventListener("pause",()=>{  
  curtainReset();  
  if(isSyncing)return;  
  pushState({action:"pause",time:vid.currentTime,rate:vid.playbackRate,ts:Date.now()});  
});  

vid.addEventListener("seeked",()=>{  
  curtainOpenAndGo();  
  if(isSyncing)return;  
  var now=Date.now();  
  if(now-lastSeekSend<250)return;  
  lastSeekSend=now;  
  pushState({action:"seek",time:vid.currentTime,rate:vid.playbackRate,ts:now});  
});  

vid.addEventListener("ratechange",()=>{  
  if(isSyncing)return;  
  pushState({action:"rate",time:vid.currentTime,rate:vid.playbackRate,ts:Date.now()});  
});  

db.ref("video/state").on("value",snap=>{  
  var s=snap.val();  
  if(!s)return;  
  isSyncing=true;  

  if(typeof s.rate==="number" && vid.playbackRate!==s.rate){  
    vid.playbackRate=s.rate;  
  }  

  if(typeof s.time==="number" && Math.abs(vid.currentTime-s.time)>0.6){  
    try{vid.currentTime=s.time;}catch(e){}  
  }  

  if(s.action==="seek"){ curtainOpenAndGo(); }  

  if(s.action==="play"){  
    var p=vid.play();  
    if(p && p.catch)p.catch(()=>{});  
  }  
  if(s.action==="pause"){ vid.pause(); }  

  setTimeout(()=>{isSyncing=false;},300);  
});  
/* ===== END SYNC ===== */

      var userName = data.user;
      
      usersHtml += `<span class="online-user" data-user-id="${userId}">
        <span class="dot"></span>
        ${userName}${isMe ? ' (شما)' : ''}
        <span class="ping-badge">--</span>
      </span>`;
    }
  });
  
  document.getElementById("onlineUsers").innerHTML = usersHtml;
  
  // به‌روزرسانی پینگ
  setTimeout(() => {
    updateMyPing();
    updateUserPings();
  }, 500);
});

// اگر کاربر لاگین کرده بود ولی بعد از رفرش آنلاین نشده بود
if(username){
  var con = db.ref("online/" + myId);
  con.set({user: username, ts: Date.now()});
  con.onDisconnect().remove();
}

/*****************************/
/* ✅ REPLY PREVIEW SYSTEM ✅ */
/*****************************/
function setReply(text){  
  replyTo=text;  
  var box=document.getElementById("replyPreview");  
  var t=document.getElementById("replyPreviewText");  
  t.innerText=text;  
  box.style.display="block";  
  try{msg.focus();}catch(e){}  
}  
function cancelReply(){  
  replyTo=null;  
  var box=document.getElementById("replyPreview");  
  box.style.display="none";  
  document.getElementById("replyPreviewText").innerText="";  
}  

/****************************/
/* ✅ EDIT MESSAGE SYSTEM ✅ */
/****************************/
function setEdit(key,oldText){  
  editKey=key;  
  document.getElementById("editPreviewText").innerText=oldText;  
  document.getElementById("editPreview").style.display="block";  
  msg.value=oldText;  
  try{msg.focus();}catch(e){}  
  cancelReply();  
}  
function cancelEdit(){  
  editKey=null;  
  document.getElementById("editPreview").style.display="none";  
  document.getElementById("editPreviewText").innerText="";  
  msg.value="";  
}  

/*****************************/
/* ✅ TYPING INDICATOR ✅     */
/*****************************/
function setTyping(isTyping){  
  db.ref("typing/"+myId).set(isTyping?{user:username,typing:true,ts:Date.now()}:null);  
}  
db.ref("typing/"+myId).onDisconnect().remove();  

var typingTimer=null;  
msg.addEventListener("input",()=>{  
  setTyping(true);  
  if(typingTimer)clearTimeout(typingTimer);  
  typingTimer=setTimeout(()=>{setTyping(false);},900);  
});  
msg.addEventListener("blur",()=>{setTyping(false);});  

db.ref("typing").on("value",snap=>{  
  var names=[];  
  snap.forEach(c=>{  
    if(c.key!==myId && c.val() && c.val().typing){  
      names.push(c.val().user||"someone");  
    }  
  });  
  var box=document.getElementById("typingIndicator");  
  if(names.length){  
    box.style.display="block";  
    box.innerText=(names.length===1?names[0]:"چند نفر")+" در حال تایپ...";  
  }else{  
    box.style.display="none";  
    box.innerText="";  
  }  
});  

/*****************************/
/* ✅ CLOSE ANY OPEN PICKER ✅ */
/*****************************/
function closeAllPickers(){  
  document.querySelectorAll(".reaction-picker").forEach(p=>p.remove());  
}  
document.addEventListener("click",()=>{closeAllPickers();});  

/*****************************/
/* ✅ SEND (device removed)  */
/*****************************/
function send(){  
  if(!msg.value || !username) return;  

  if(editKey){  
    db.ref("chat/"+editKey+"/text").set(msg.value);  
    db.ref("chat/"+editKey+"/edited").set(true);  
    msg.value="";  
    cancelEdit();  
    setTyping(false);  
    return;  
  }  

  db.ref("chat").push({  
    text:msg.value,  
    user:username,  
    time:Date.now(),  
    reply:replyTo,  
    seen:false,  
    edited:false,  
    reactions:{}  
  });  
  msg.value="";  
  cancelReply();  
  setTyping(false);  
}  

/********************************************/
/* ✅ DOUBLE TAP / DOUBLE CLICK TO REPLY ✅ */
/********************************************/
var lastTapTimeByKey={};  
function attachReplyHandlers(div,key,text){  
  div.addEventListener("dblclick",function(e){  
    e.stopPropagation();  
    setReply(text);  
  });  
  div.addEventListener("touchend",function(e){  
    var now=Date.now();  
    var last=lastTapTimeByKey[key]||0;  
    lastTapTimeByKey[key]=now;  
    if(now-last<320){  
      try{e.preventDefault();}catch(err){}  
      setReply(text);  
    }  
  },{passive:false});  
}  

/*****************************/
/* ✅ DELETE SINGLE MESSAGE ✅ */
/*****************************/
function deleteMessage(key){
  db.ref("chat/"+key).remove();
}

/*****************************/
/* ✅ CHAT RENDER            */
/*****************************/
db.ref("chat").on("child_added",snap=>{  
  var d=snap.val();  
  var key=snap.key;  

  if(d.user!==username){  
    db.ref("chat/"+key+"/seen").set(true);  
  }  

  var div=document.createElement("div");  
  div.className="message "+(d.user===username?"me":"other");  
  div.id="m_"+key;  

  var nameDiv=document.createElement("div");
  nameDiv.className="msg-username";
  nameDiv.innerText=d.user;
  div.appendChild(nameDiv);

  if(d.reply){  
    var rep=document.createElement("div");  
    rep.className="reply-box";  
    rep.innerText=d.reply;  
    div.appendChild(rep);  
  }  

  var text=document.createElement("div");  
  text.innerText=d.text;  
  div.appendChild(text);  

  var meta=document.createElement("div");  
  meta.className="meta";  

  var reactBtn=document.createElement("span");  
  reactBtn.className="react-btn";  
  reactBtn.innerText="😊";  
  reactBtn.onclick=function(ev){  
    ev.stopPropagation();  
    closeAllPickers();  
    showReactions(key,div);  
  };  

  if(d.user===username){  
    var editBtn=document.createElement("span");  
    editBtn.className="edit-btn";  
    editBtn.innerText="✎";  
    editBtn.onclick=function(ev){  
      ev.stopPropagation();  
      closeAllPickers();  
      setEdit(key,d.text);  
    };  

    var delBtn=document.createElement("span");
    delBtn.className="del-btn";
    delBtn.innerText="🗑";
    delBtn.onclick=function(ev){
      ev.stopPropagation();
      if(confirm("پیام حذف بشه؟")){
        deleteMessage(key);
      }
    };
  }  

  meta.innerHTML=new Date(d.time).toLocaleTimeString().slice(0,5)  
  +(d.edited?" <span style='opacity:.75'>(edited)</span>":"")  
  +(d.user===username?" <span id='s"+key+"'>✔</span>":"");  

  if(d.user===username){  
    meta.appendChild(editBtn);  
    meta.appendChild(delBtn);
  }  
  meta.appendChild(reactBtn);  
  div.appendChild(meta);  

  var react=document.createElement("div");  
  react.className="reactions";  
  div.appendChild(react);  

  div.onclick=function(e){ e.stopPropagation(); };  
  attachReplyHandlers(div,key,d.text);  

  chat.appendChild(div);  
  chat.scrollTop=chat.scrollHeight;  

  if(d.user===username){  
    db.ref("chat/"+key+"/seen").on("value",s=>{  
      var el=document.getElementById("s"+key);
      if(el) el.innerText=s.val()?"✔✔":"✔";  
    });  
  }  
});  

db.ref("chat").on("child_removed",snap=>{
  var el=document.getElementById("m_"+snap.key);
  if(el) el.remove();
});

/*****************************/
/* ✅ REACTIONS PICKER       */
/*****************************/
function showReactions(key,div){  
  if(div.querySelector(".reaction-picker"))return;  
  var picker=document.createElement("div");  
  picker.className="reaction-picker";  

  var close=document.createElement("span");  
  close.className="picker-close";  
  close.innerText="✕";  
  close.onclick=function(ev){  
    ev.stopPropagation();  
    picker.remove();  
  };  
  picker.appendChild(close);  

  ["😍","😎","🤣","🩷","👌","😭","😡","🔥","😜"].forEach(e=>{  
    var span=document.createElement("span");  
    span.innerText=e;  
    span.onclick=function(ev){  
      ev.stopPropagation();  
      db.ref("chat/"+key+"/reactions/"+myId).set(e);  
      picker.remove();  
    };  
    picker.appendChild(span);  
  });  
  div.appendChild(picker);  
}  

db.ref("chat").on("child_changed",snap=>{  
  var d=snap.val();  
  var m=document.getElementById("m_"+snap.key);  
  if(m){  
    var mainText=m.querySelector("div:nth-child(2)");  
    if(mainText) mainText.innerText=d.text;  

    var meta=m.querySelector(".meta");  
    if(meta){  
      var timeStr=new Date(d.time).toLocaleTimeString().slice(0,5);  
      var editedStr=d.edited?" <span style='opacity:.75'>(edited)</span>":"";  
      if(d.user===username){  
        meta.innerHTML=timeStr+editedStr+" <span id='s"+snap.key+"'>"+(d.seen?"✔✔":"✔")+"</span>";  

        var editBtn=document.createElement("span");  
        editBtn.className="edit-btn";  
        editBtn.innerText="✎";  
        editBtn.onclick=function(ev){  
          ev.stopPropagation();  
          closeAllPickers();  
          setEdit(snap.key,d.text);  
        };  

        var delBtn=document.createElement("span");
        delBtn.className="del-btn";
        delBtn.innerText="🗑";
        delBtn.onclick=function(ev){
          ev.stopPropagation();
          if(confirm("پیام حذف بشه؟")){
            deleteMessage(snap.key);
          }
        };

        meta.appendChild(editBtn);  
        meta.appendChild(delBtn);

        var reactBtn=document.createElement("span");  
        reactBtn.className="react-btn";  
        reactBtn.innerText="😊";  
        reactBtn.onclick=function(ev){  
          ev.stopPropagation();  
          closeAllPickers();  
          showReactions(snap.key,m);  
        };  
        meta.appendChild(reactBtn);  
      }else{  
        meta.innerHTML=timeStr+editedStr;  
        var reactBtn=document.createElement("span");  
        reactBtn.className="react-btn";  
        reactBtn.innerText="😊";  
        reactBtn.onclick=function(ev){  
          ev.stopPropagation();  
          closeAllPickers();  
          showReactions(snap.key,m);  
        };  
        meta.appendChild(reactBtn);  
      }  
    }  
  }  

  var react=document.querySelector("#m_"+snap.key+" .reactions");  
  if(react){  
    react.innerHTML="";  
    if(d.reactions){  
      Object.values(d.reactions).forEach(e=>{  
        react.innerHTML+=e+" ";  
      });  
    }  
  }  
});  

/*****************************/
/* ✅ CLEAR CHAT (SYNC) ✅    */
/*****************************/
function clearChat(){  
  db.ref("chat").remove();  
  chat.innerHTML="";  
  cancelReply();  
  cancelEdit();  
}  

</script>  


<script>
document.addEventListener("DOMContentLoaded", function () {
    const typingEl = document.getElementById("typingIndicator");
    if (typingEl) typingEl.style.display = "none";
});
</script>


<script>
document.addEventListener("DOMContentLoaded", function () {
    const video = document.querySelector("video");
    const videoWrapper = document.querySelector(".video-wrapper");

    if (videoWrapper) {
        videoWrapper.style.minHeight = "88vh";
    }

    if (video) {
        video.addEventListener("play", () => {
            video.style.marginTop = "25px";
            video.style.transition = "all 0.4s ease";
        });

        video.addEventListener("pause", () => {
            video.style.marginTop = "0px";
        });
    }
});
</script>

<script>
/* ===== VIDEO SIZE CONTROL ===== */
var __sizeBtn = document.getElementById("videoSizeBtn");
var __sizePanel = document.getElementById("videoSizePanel");

function closeSizePanel(){
  if(__sizePanel) __sizePanel.style.display="none";
}

if(__sizeBtn){
__sizeBtn.addEventListener("click",function(e){
e.stopPropagation();
__sizePanel.style.display =
(__sizePanel.style.display==="none" || !__sizePanel.style.display)
? "block" : "none";
});
}

function setVideoSize(mode){
var v=document.getElementById("video");
if(!v)return;

if(mode==="contain"){
v.style.objectFit="contain";
}
else if(mode==="cover"){
v.style.objectFit="cover";
}
else if(mode==="100"){
v.style.objectFit="contain";
v.style.width="100%";
v.style.height="100%";
}
else if(mode==="stretch"){
v.style.objectFit="fill";
}

closeSizePanel();
}

document.addEventListener("click",function(){
closeSizePanel();
});
</script>
